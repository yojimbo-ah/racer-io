# ---- Positions (Socket.io — needs websocket support + rate limiting) ----
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: positions-ingress
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "positions-srv"
    nginx.ingress.kubernetes.io/limit-rps: "5"
    nginx.ingress.kubernetes.io/limit-connections: "20"
spec:
  ingressClassName: nginx
  tls:
    - secretName: ticket-com-tls
      hosts:
        - ticket.com
  rules:
    - host: ticket.com
      http:
        paths:
          - path: /api/positions/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: positions-srv
                port:
                  number: 3000
          - path: /socket.io/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: positions-srv
                port:
                  number: 3000
---
# ---- Auth (strict — brute force / credential stuffing risk) ----
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-ingress
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-rpm: "5"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "2"
spec:
  ingressClassName: nginx
  tls:
    - secretName: ticket-com-tls
      hosts:
        - ticket.com
  rules:
    - host: ticket.com
      http:
        paths:
          - path: /api/users/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-srv
                port:
                  number: 3000
---
