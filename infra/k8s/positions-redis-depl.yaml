apiVersion: apps/v1
kind: Deployment
metadata:
  name: positions-redis-depl
  labels:
    app: positions-redis
spec:
  replicas: 1
  selector:
    matchLabels: 
      app: positions-redis
  template: 
    metadata:
      labels:
        app: positions-redis
    spec:
      containers:
        - name: positions-redis
          image: redis:latest
          ports:
            - containerPort: 27017
---
# Service
apiVersion: v1
kind: Service
metadata: 
  name: positions-redis-srv
spec: 
  selector:
    app: positions-redis
  ports:
    - name: db
      protocol: TCP
      port: 6379
      targetPort: 6379
